<aside class="b2b-sidebar">
  <div class="sidebar-logo">
    <rdc-logo variant="light" [size]="28" />
  </div>

  <div class="sidebar-section-label">Empresa</div>

  @for (item of items; track item.id) {
    <div class="nav-item" [class.nav-item-active]="active === item.id" (click)="nav.emit(item.id)">
      <rdc-icon [name]="item.icon" [size]="16" [color]="active === item.id ? '#fff' : '#CEDCEC'" />
      <span>{{ item.label }}</span>
    </div>
  }

  <div class="company-card">
    <div class="company-label">Empresa</div>
    <div class="company-name">Acme Tecnologia S.A.</div>
    <div class="company-sub">42 colaboradores</div>
  </div>
</aside>
