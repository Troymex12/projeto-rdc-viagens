<div class="sidebar-card">
  <div class="sidebar-title">
    <rdc-icon name="filter" [size]="16" color="#0A2540" />
    Filtros
  </div>

  <!-- Preço por noite -->
  <div class="filter-group">
    <div class="group-title">Preço por noite</div>
    <div class="price-range-labels">
      <span>R$ 200</span>
      <span>R$ 2.000+</span>
    </div>
    <div class="price-track">
      <div class="price-fill"></div>
      <div class="price-thumb price-thumb-left"></div>
      <div class="price-thumb price-thumb-right"></div>
    </div>
  </div>

  @for (group of groups; track group.title) {
    <div class="filter-group">
      <div class="group-title">{{ group.title }}</div>
      @for (item of group.items; track item.label) {
        <div class="chk-row" (click)="toggle(item)">
          <div class="chk-box" [class.chk-checked]="item.checked">
            @if (item.checked) {
              <rdc-icon name="check" [size]="12" color="#fff" [strokeWidth]="3" />
            }
          </div>
          <span class="chk-label">{{ item.label }}</span>
          <span class="chk-count">{{ item.count }}</span>
        </div>
      }
    </div>
  }
</div>
