<div class="map-container">
  <!-- SVG de fundo simulando estradas/ruas do mapa -->
  <svg class="map-bg" viewBox="0 0 400 500" preserveAspectRatio="none">
    <path d="M0,200 Q100,150 200,220 T400,180" stroke="#9CB8DA" stroke-width="2" fill="none"/>
    <path d="M0,320 Q120,280 220,340 T400,300" stroke="#9CB8DA" stroke-width="2" fill="none"/>
    <path d="M150,0 Q180,200 220,500" stroke="#9CB8DA" stroke-width="2" fill="none"/>
    <path d="M280,0 Q260,250 300,500" stroke="#9CB8DA" stroke-width="2" fill="none"/>
    <circle cx="120" cy="350" r="60" fill="#00A8A8" opacity=".15"/>
    <circle cx="280" cy="180" r="80" fill="#FF7A00" opacity=".1"/>
    <!-- Grid de quadras -->
    <path d="M0,100 H400 M0,250 H400 M0,400 H400" stroke="#C8D6E8" stroke-width="1" fill="none" opacity=".5"/>
    <path d="M80,0 V500 M200,0 V500 M320,0 V500" stroke="#C8D6E8" stroke-width="1" fill="none" opacity=".5"/>
  </svg>

  <!-- Pins de preço -->
  @for (pin of pins; track pin.price) {
    <div class="map-pin"
      [class.map-pin-selected]="pin.hotelIndex === selectedIndex"
      [style.top]="pin.top"
      [style.left]="pin.left">
      R$ {{ pin.price }}
    </div>
  }

  <!-- Controles de zoom -->
  <div class="map-controls">
    <button class="map-btn" type="button">
      <rdc-icon name="plus" [size]="16" color="#0A2540" />
    </button>
    <button class="map-btn" type="button">
      <rdc-icon name="minus" [size]="16" color="#0A2540" />
    </button>
  </div>
</div>
